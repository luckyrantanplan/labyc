syntax = "proto3";

package proto;

message Filepaths {
	string outputfile = 1;
	string inputfile = 2;
}

message PenStroke {
	double thickness = 1;
	double antisymmetric_amplitude = 2;
	double antisymmetric_freq = 3;
	double antisymmetric_seed = 4;
	double symmetric_amplitude = 5;
	double symmetric_freq = 6;
	double symmetric_seed = 7;
	double resolution = 8;
}

message GraphicRendering {
	string outputfile = 1;
	string inputfile = 2;
	double smoothing_tension = 3;
	double smoothing_iterations = 4;
	PenStroke penConfig = 9;
}

message SkeletonGrid {
	string outputfile = 1;
	string inputfile = 2;
	double simplificationOfOriginalSVG = 3;
	double max_sep = 4;
	double min_sep = 5;
	uint32 seed = 6;
}

message RoutingCost {
	uint32 seed = 1;
	uint32 max_random = 2;
	uint32 distance_unit_cost = 3;
	uint32 via_unit_cost = 4;
}

message Cell {
	uint32 seed = 1;
	uint32 maxPin = 2;
	uint32 startNet = 3;
	double resolution = 4;
}

message Placement {
	double initial_thickness = 1;
	double decrement_factor = 2;
	double minimal_thickness = 3;
	double smoothing_tension = 4;
	uint32 smoothing_iteration = 5;
	uint64 max_routing_attempt = 6;
	RoutingCost routing = 7;
	Cell cell = 8;
}

message AlternateRouting {
	double maxThickness = 1;
	double minThickness = 2;
	uint32 pruning = 3;
	double thicknessPercent = 4;
	double simplifyDist = 5;
}

message Routing {
	Filepaths filepaths = 1;
	Placement placement = 2;
	AlternateRouting alternateRouting = 3;
}

message HqNoise {
	Filepaths filepaths = 1;
	uint32 maxN = 2;
	uint32 accuracy = 3;
	double amplitude = 4;
	double seed = 5;
	double gaussianFrequency = 6;
	double powerlawFrequency = 7;
	double powerlawPower = 8;
	bool complex = 9;
	uint32 width = 10;
	uint32 height = 11;
	double scale = 12;
	enum PreviewMode {
		ARROWS = 0;
		MAGNITUDE = 1;
		NONE = 2;
	}
	PreviewMode previewMode = 13;
	string previewFile = 14;
	uint32 previewStride = 15;
}

message StreamLineCfg {
	Filepaths filepaths = 1;
	int32 resolution = 2;
	double simplifyDistance = 3;
	double dRat = 4;
	double epsilon = 5;
	double size = 6;
	double divisor = 7;
	double strokeThickness = 8;
}

message ComplexField2DData {
	uint32 width = 1;
	uint32 height = 2;
	double originX = 3;
	double originY = 4;
	double scale = 5;
	repeated double values = 6 [packed = true];
}

message AllConfig {
	Routing routing = 1;
	GraphicRendering gGraphicRendering = 2;
	SkeletonGrid skeletonGrid = 3;
	HqNoise hqNoise = 4;
	StreamLineCfg streamLine = 5;
}