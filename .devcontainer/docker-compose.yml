services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      # X11 forwarding for PyQt6 GUI
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_QPA_PLATFORM=${QT_QPA_PLATFORM:-xcb}
    # Keep the container running
    command: sleep infinity
    # Required for GDB debugging
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
